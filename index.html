a<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streamr</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #040714;
  --bg2: #0b0f23;
  --bg3: #111630;
  --bg4: #1a2148;
  --blue: #0963d7;
  --blue2: #0483ee;
  --cyan: #00d4f5;
  --border: rgba(255,255,255,0.07);
  --text: #f9f9f9;
  --muted: #8a8d98;
  --nav-h: 62px;
  --row-gap: 6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1a2040;border-radius:2px}

/* NAV */
.dplus-nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:var(--nav-h);
  display:flex;align-items:center;
  padding:0 2rem;gap:0;
  background:linear-gradient(to bottom,rgba(4,7,20,0.98) 0%,rgba(4,7,20,0) 100%);
  transition:background 0.3s;
}
.dplus-nav.scrolled{background:rgba(4,7,20,0.97);border-bottom:1px solid var(--border);backdrop-filter:blur(20px)}
.nav-left{display:flex;align-items:center;gap:12px;margin-right:32px}
.nav-avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#0063e5,#00d4f5);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#fff;cursor:pointer;
  border:2px solid rgba(255,255,255,0.2);
}
.nav-brand{font-size:18px;font-weight:800;letter-spacing:4px;color:#fff;cursor:pointer;text-transform:uppercase}
.nav-brand span{color:var(--blue2)}
.nav-center{display:flex;align-items:center;gap:2px;flex:1;justify-content:center}
.nav-item{
  display:flex;align-items:center;gap:7px;
  padding:9px 18px;border-radius:6px;
  font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  color:rgba(255,255,255,0.6);cursor:pointer;background:transparent;border:none;
  font-family:'Inter',sans-serif;transition:all 0.2s;white-space:nowrap;
}
.nav-item:hover{color:#fff;background:rgba(255,255,255,0.07)}
.nav-item.active{color:#fff}
.nav-item .nav-icon{font-size:14px;flex-shrink:0}
.nav-right{display:flex;align-items:center;gap:6px;margin-left:32px}
.nav-btn{
  width:38px;height:38px;background:transparent;border:none;
  color:rgba(255,255,255,0.6);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;transition:all 0.2s;
}
.nav-btn:hover{color:#fff;background:rgba(255,255,255,0.1)}

/* SEARCH OVERLAY */
.search-overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(4,7,20,0.98);backdrop-filter:blur(20px);
  flex-direction:column;align-items:center;padding-top:120px;
}
.search-overlay.open{display:flex}
.search-overlay-inner{width:100%;max-width:700px;padding:0 2rem}
.search-overlay-title{font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
.search-inp-wrap{position:relative;margin-bottom:32px}
.search-inp{
  width:100%;padding:16px 52px 16px 20px;
  background:var(--bg2);border:1px solid rgba(255,255,255,0.12);
  border-radius:12px;color:#fff;font-size:18px;font-family:'Inter',sans-serif;
  outline:none;transition:border 0.2s;
}
.search-inp:focus{border-color:var(--blue2)}
.search-inp::placeholder{color:#444}
.search-inp-icon{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:#555;pointer-events:none}
.search-close-btn{
  position:absolute;top:24px;right:24px;
  width:40px;height:40px;background:var(--bg2);border:1px solid var(--border);
  border-radius:50%;color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.2s;
}
.search-close-btn:hover{color:#fff;border-color:rgba(255,255,255,0.2)}
.search-results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;max-height:60vh;overflow-y:auto}

/* HERO */
.hero{
  position:relative;height:100vh;min-height:600px;
  display:flex;align-items:center;overflow:hidden;
}
.hero-backdrop{
  position:absolute;inset:0;
  background-size:cover;background-position:center 20%;
  transition:opacity 1s ease;
}
.hero-backdrop::after{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(to right, rgba(4,7,20,1) 0%, rgba(4,7,20,0.75) 45%, rgba(4,7,20,0.1) 100%),
    linear-gradient(to top, rgba(4,7,20,1) 0%, rgba(4,7,20,0.4) 25%, transparent 55%),
    linear-gradient(to bottom, rgba(4,7,20,0.6) 0%, transparent 15%);
}
.hero-inner{
  position:relative;z-index:2;width:100%;max-width:1440px;margin:0 auto;
  padding:0 4rem;display:flex;align-items:center;gap:5rem;
}
.hero-left{flex:0 0 auto;width:460px}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--cyan);margin-bottom:14px;
}
.hero-eyebrow-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.hero-title{font-size:56px;font-weight:800;line-height:1.0;letter-spacing:-2px;margin-bottom:10px}
.hero-tagline{font-size:15px;font-style:italic;color:rgba(255,255,255,0.5);margin-bottom:14px}
.hero-chips{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.hero-chip{
  font-size:12px;font-weight:600;color:rgba(255,255,255,0.5);
  display:flex;align-items:center;gap:5px;
}
.hero-chip-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.3)}
.hero-rating{color:#f5c518;font-size:13px;font-weight:700}
.hero-genres{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.hero-genre{
  padding:5px 14px;border:1px solid rgba(255,255,255,0.18);border-radius:20px;
  font-size:11px;color:rgba(255,255,255,0.7);letter-spacing:0.3px;
}
.hero-overview{font-size:14px;color:rgba(255,255,255,0.65);line-height:1.75;margin-bottom:26px;max-width:420px}
.hero-actions{display:flex;gap:12px;align-items:center;margin-bottom:24px}
.btn-watch-now{
  display:flex;align-items:center;gap:10px;
  padding:13px 30px;background:#fff;color:#000;border:none;
  border-radius:6px;font-size:15px;font-weight:700;
  font-family:'Inter',sans-serif;cursor:pointer;transition:background 0.2s;
}
.btn-watch-now:hover{background:#e0e0e0}
.btn-details{
  display:flex;align-items:center;gap:8px;
  padding:13px 22px;background:rgba(255,255,255,0.12);color:#fff;
  border:1px solid rgba(255,255,255,0.22);border-radius:6px;
  font-size:14px;font-weight:600;font-family:'Inter',sans-serif;
  cursor:pointer;transition:background 0.2s;backdrop-filter:blur(4px);
}
.btn-details:hover{background:rgba(255,255,255,0.22)}
.hero-progress{margin-bottom:10px}
.hero-progress-bar{
  width:260px;height:3px;background:rgba(255,255,255,0.15);border-radius:2px;overflow:hidden;
}
.hero-progress-fill{height:100%;background:var(--blue2);border-radius:2px;transition:width 8s linear}
.hero-dots{display:flex;gap:7px;align-items:center}
.hero-dot{
  width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.2);
  cursor:pointer;border:none;transition:all 0.25s;
}
.hero-dot.active{background:#fff;width:22px;border-radius:4px}

/* HERO RIGHT MOSAIC */
.hero-right{flex:1;max-width:600px}
.hero-mosaic{
  display:grid;
  grid-template-columns:2fr 1fr 1fr;
  grid-template-rows:200px 160px;
  gap:5px;border-radius:14px;overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,0.9);
  border:1px solid rgba(255,255,255,0.07);
}
.mosaic-item{
  overflow:hidden;position:relative;cursor:pointer;
  background:var(--bg3);transition:transform 0.2s;
}
.mosaic-item:hover{transform:scale(1.03);z-index:3}
.mosaic-item:nth-child(1){grid-column:1;grid-row:1/3}
.mosaic-item:nth-child(2){grid-column:2/4;grid-row:1}
.mosaic-item:nth-child(3){grid-column:2;grid-row:2}
.mosaic-item:nth-child(4){grid-column:3;grid-row:2}
.mosaic-item img{width:100%;height:100%;object-fit:cover;display:block}
.mosaic-hover{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(4,7,20,0.92) 0%,transparent 60%);
  opacity:0;transition:opacity 0.2s;
  display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;
}
.mosaic-item:hover .mosaic-hover{opacity:1}
.mosaic-hover-title{font-size:11px;font-weight:700;line-height:1.3}
.mosaic-hover-meta{font-size:10px;color:#aaa;margin-top:2px}

/* CONTENT TABS */
.content-tabs-wrap{
  position:sticky;top:var(--nav-h);z-index:100;
  background:rgba(4,7,20,0.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.content-tabs{
  max-width:1440px;margin:0 auto;
  display:flex;align-items:center;gap:2px;padding:0 4rem;
}
.ctab{
  padding:14px 20px;font-size:13px;font-weight:600;letter-spacing:0.3px;
  color:var(--muted);cursor:pointer;background:transparent;border:none;
  font-family:'Inter',sans-serif;transition:all 0.2s;border-bottom:2px solid transparent;
  position:relative;top:1px;
}
.ctab:hover{color:#fff}
.ctab.active{color:#fff;border-bottom-color:#fff}

/* MAIN CONTENT */
.main-content{max-width:1440px;margin:0 auto;padding:2rem 4rem 6rem}

/* ROW */
.content-row{margin-bottom:2.5rem}
.row-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.row-ttl{font-size:14px;font-weight:700;letter-spacing:0.3px}
.row-see-all{font-size:12px;font-weight:500;color:var(--blue2);cursor:pointer;white-space:nowrap}
.row-see-all:hover{text-decoration:underline}
.row-scroll-wrap{position:relative}
.row-scroll{
  display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;
  scroll-behavior:smooth;
  scrollbar-width:none;
}
.row-scroll::-webkit-scrollbar{display:none}
.scroll-arrow{
  position:absolute;top:50%;transform:translateY(-60%);z-index:10;
  width:36px;height:80%;background:linear-gradient(to right,rgba(4,7,20,0.95),rgba(4,7,20,0.95));
  border:none;cursor:pointer;color:rgba(255,255,255,0.8);
  display:flex;align-items:center;justify-content:center;font-size:22px;
  opacity:0;transition:opacity 0.2s;
}
.row-scroll-wrap:hover .scroll-arrow{opacity:1}
.scroll-arrow.left{left:0;background:linear-gradient(to right,rgba(4,7,20,1),rgba(4,7,20,0));padding-right:12px;justify-content:flex-start}
.scroll-arrow.right{right:0;background:linear-gradient(to left,rgba(4,7,20,1),rgba(4,7,20,0));padding-left:12px;justify-content:flex-end}

/* CARD */
.dcard{
  flex:0 0 160px;cursor:pointer;border-radius:6px;overflow:hidden;
  background:var(--bg2);border:1px solid var(--border);
  transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;
  position:relative;
}
.dcard:hover{transform:scale(1.06);z-index:5;box-shadow:0 16px 40px rgba(0,0,0,0.8);border-color:rgba(255,255,255,0.2)}
.dcard-poster{position:relative;padding-bottom:150%;background:var(--bg3)}
.dcard-poster img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.dcard-poster-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--bg4);font-size:32px}
.dcard-hover-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(4,7,20,0.97) 0%,transparent 60%);
  opacity:0;transition:opacity 0.2s;
  display:flex;flex-direction:column;justify-content:flex-end;padding:10px;
}
.dcard:hover .dcard-hover-overlay{opacity:1}
.dcard-play{
  width:32px;height:32px;background:#fff;border-radius:50%;
  display:flex;align-items:center;justify-content:center;margin-bottom:6px;flex-shrink:0;
}
.dcard-hover-title{font-size:11px;font-weight:700;line-height:1.3;margin-bottom:2px}
.dcard-hover-meta{font-size:10px;color:#aaa}
.dcard-type{
  position:absolute;top:6px;left:6px;
  background:rgba(4,7,20,0.85);color:#fff;font-size:9px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px;
}
.dcard-info{padding:7px 9px 9px}
.dcard-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.dcard-meta{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.star{color:#f5c518;font-size:10px}

/* LOADING */
.dcard-skeleton{flex:0 0 160px;border-radius:6px;overflow:hidden;background:var(--bg2);border:1px solid var(--border)}
.skel{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-poster{padding-bottom:150%}
.skel-line{height:10px;margin:7px 9px;border-radius:4px}
.skel-line.short{width:60%;margin-top:4px}

/* PLAYER MODAL */
.player-modal{
  display:none;position:fixed;inset:0;z-index:400;
  background:rgba(4,7,20,0.98);overflow-y:auto;
}
.player-modal.open{display:block}
.player-modal-inner{max-width:1100px;margin:0 auto;padding:1.5rem 2rem 4rem}
.pm-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 0 1rem;margin-bottom:1rem;
  border-bottom:1px solid var(--border);
}
.pm-title{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.pm-close{
  background:var(--bg2);border:1px solid var(--border);color:var(--muted);
  padding:9px 20px;border-radius:6px;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:500;transition:all 0.2s;
}
.pm-close:hover{border-color:rgba(255,255,255,0.2);color:#fff}
.pm-actions{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.pm-btn-primary{
  display:flex;align-items:center;gap:7px;
  padding:10px 22px;background:var(--blue);color:#fff;border:none;
  border-radius:6px;font-size:14px;font-weight:700;
  font-family:'Inter',sans-serif;cursor:pointer;transition:background 0.2s;
}
.pm-btn-primary:hover{background:var(--blue2)}
.pm-btn-sec{
  padding:10px 18px;background:var(--bg2);color:#fff;
  border:1px solid var(--border);border-radius:6px;font-size:14px;font-weight:500;
  font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;
}
.pm-btn-sec:hover{background:var(--bg3);border-color:rgba(255,255,255,0.15)}
.pm-servers{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;margin-bottom:8px;
}
.pm-servers-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:600}
.pm-server-btns{display:flex;gap:6px;flex-wrap:wrap}
.psrv{
  padding:7px 16px;background:var(--bg3);border:1px solid var(--border);
  border-radius:5px;color:var(--muted);font-size:12px;font-weight:600;
  cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;
}
.psrv:hover{border-color:rgba(255,255,255,0.2);color:#fff}
.psrv.active{border-color:var(--blue2);color:#6ab0ff;background:rgba(4,131,238,0.12)}
.psrv.best{background:linear-gradient(135deg,#0063e5,#0483ee);color:#fff;border-color:transparent}
.psrv.best.active{box-shadow:0 0 0 2px rgba(255,255,255,0.25)}
.psrv.hd-btn{background:linear-gradient(135deg,#0a4faa,#0099cc);color:#fff;border-color:transparent}
.pm-episodes{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;margin-bottom:8px;display:none;
}
.pm-ep-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:600}
.pm-season-sel{
  padding:9px 14px;background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;color:#fff;font-size:13px;font-family:'Inter',sans-serif;
  outline:none;cursor:pointer;margin-bottom:10px;
}
.pm-season-sel:focus{border-color:var(--blue2)}
.pm-ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(44px,1fr));gap:4px;max-height:130px;overflow-y:auto}
.pm-ep-btn{
  padding:7px 4px;background:var(--bg3);border:1px solid var(--border);
  border-radius:4px;color:var(--muted);font-size:12px;font-weight:500;
  cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;text-align:center;
}
.pm-ep-btn:hover{border-color:var(--blue2);color:#fff}
.pm-ep-btn.active{border-color:var(--blue2);color:#6ab0ff;background:rgba(4,131,238,0.12)}
.pm-player{
  position:relative;padding-bottom:56.25%;height:0;
  background:#000;border-radius:10px;overflow:hidden;
  margin-bottom:8px;border:1px solid var(--border);
}
#stream-frame{position:absolute;inset:0;width:100%;height:100%;border:none;opacity:0;transition:opacity 0.3s}
.pm-loading{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;color:var(--muted);font-size:13px;
}
.spinner{width:30px;height:30px;border:2px solid var(--bg3);border-top-color:var(--blue2);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pm-overview{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;margin-top:8px;
}
.pm-overview-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--blue2);margin-bottom:8px;font-weight:700}
.pm-overview-text{font-size:13px;color:#bbb;line-height:1.75}

.err{background:rgba(229,9,20,0.1);border:1px solid rgba(229,9,20,0.2);color:#ff7070;padding:12px 16px;border-radius:8px;font-size:13px;text-align:center}

@media(max-width:1024px){
  .hero-right{display:none}
  .hero-inner,.main-content{padding-left:2rem;padding-right:2rem}
  .content-tabs{padding-left:2rem;padding-right:2rem}
  .hero-title{font-size:40px}
}
@media(max-width:700px){
  .nav-item span{display:none}
  .nav-item{padding:9px 12px}
  .hero-inner,.main-content{padding-left:1.2rem;padding-right:1.2rem}
  .content-tabs{padding-left:1.2rem;padding-right:1.2rem}
  .hero-title{font-size:30px}
  .dcard{flex:0 0 130px}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="dplus-nav" id="mainNav">
  <div class="nav-left">
    <div class="nav-avatar">S</div>
    <div class="nav-brand">STREAM<span>R</span></div>
  </div>
  <div class="nav-center">
    <button class="nav-item active" id="navHome" onclick="navHome(this)">
      <span class="nav-icon">⌂</span><span>HOME</span>
    </button>
    <button class="nav-item" onclick="navMovies(this)">
      <span class="nav-icon">🎬</span><span>MOVIES</span>
    </button>
    <button class="nav-item" onclick="navSeries(this)">
      <span class="nav-icon">📺</span><span>SERIES</span>
    </button>
    <button class="nav-item" onclick="navTrending(this)">
      <span class="nav-icon">⚡</span><span>TRENDING</span>
    </button>
    <button class="nav-item" onclick="navTopRated(this)">
      <span class="nav-icon">★</span><span>TOP RATED</span>
    </button>
  </div>
  <div class="nav-right">
    <button class="nav-btn" onclick="openSearch()" title="Search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
  </div>
</nav>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="searchOverlay">
  <button class="search-close-btn" onclick="closeSearch()">✕</button>
  <div class="search-overlay-inner">
    <div class="search-overlay-title">Search</div>
    <div class="search-inp-wrap">
      <input class="search-inp" id="searchInput" type="text" placeholder="Movies, shows, actors...">
      <div class="search-inp-icon">

<script>
const KEY = 'fa64f41725332deb0b80d192ffc69f2e';
const BASE = 'https://api.themoviedb.org/3';
const IMG = 'https://image.tmdb.org/t/p/w500';
const BACK = 'https://image.tmdb.org/t/p/w1280';

let heroItems=[], heroIdx=0, heroTimer=null;
let curType='movie', curId='', curSeason=1, curEp=1, curServer='vidapi', curData=null;
let searchTO=null;

// ── UTILS ──
async function api(path) {
  try {
    const sep = path.includes('?') ? '&' : '?';
    const r = await fetch(`${BASE}${path}${sep}api_key=${KEY}&language=en-US`);
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch(e) { console.error(e); return null; }
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function scrollRow(id, dir) {
  const el = document.getElementById(id);
  if (el) el.scrollBy({ left: dir * 600, behavior: 'smooth' });
}

// ── NAV SCROLL ──
window.addEventListener('scroll', () => {
  document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 80);
});

// ── HERO ──
async function initHero() {
  const [mov, tv] = await Promise.all([api('/trending/movie/week'), api('/trending/tv/week')]);
  heroItems = [...(mov?.results||[]).slice(0,6), ...(tv?.results||[]).slice(0,6)].sort(()=>Math.random()-0.5).slice(0,10);
  buildDots();
  await renderHero(0);
  buildMosaic();
  startTimer();
}
function buildDots() {
  document.getElementById('heroDots').innerHTML = heroItems.map((_,i) =>
    `<button class="hero-dot ${i===0?'active':''}" onclick="jumpHero(${i})"></button>`
  ).join('');
}
async function renderHero(i) {
  heroIdx = i;
  const item = heroItems[i];
  if (!item) return;
  const type = item.title ? 'movie' : 'tv';
  const title = item.title || item.name || '';
  const year = (item.release_date || item.first_air_date || '').slice(0,4);
  const rating = item.vote_average ? item.vote_average.toFixed(1) : '';
  document.getElementById('heroBg').style.backgroundImage = item.backdrop_path ? `url(${BACK}${item.backdrop_path})` : '';
  document.getElementById('heroTitle').textContent = title;
  document.getElementById('heroRating').textContent = rating ? '★ ' + rating : '';
  document.getElementById('heroYear').textContent = year;
  document.getElementById('heroOverview').textContent = (item.overview||'').slice(0,200)+((item.overview||'').length>200?'...':'');
  document.getElementById('heroBadge').textContent = type==='tv' ? 'Series' : 'Movie';
  document.getElementById('heroTagline').textContent = '';
  document.getElementById('heroExtra').textContent = '';
  document.getElementById('heroGenres').innerHTML = '';
  [document.getElementById('heroDot1'),document.getElementById('heroDot2')].forEach(d=>d.style.display='none');
  document.getElementById('heroWatchBtn').onclick = () => openPlayer(type, item.id);
  document.getElementById('heroDetailsBtn').onclick = () => openPlayer(type, item.id);
  document.querySelectorAll('.hero-dot').forEach((d,idx) => d.classList.toggle('active', idx===i));
  // reset progress
  const fill = document.getElementById('heroProgressFill');
  fill.style.transition = 'none'; fill.style.width = '0%';
  setTimeout(() => { fill.style.transition = 'width 8s linear'; fill.style.width = '100%'; }, 50);
  // fetch details
  try {
    const det = await api(`/${type}/${item.id}`);
    if (det) {
      if (det.tagline) document.getElementById('heroTagline').textContent = `"${det.tagline}"`;
      const genres = (det.genres||[]).slice(0,3).map(g=>`<span class="hero-genre">${g.name}</span>`).join('');
      document.getElementById('heroGenres').innerHTML = genres;
      if (year) document.getElementById('heroDot1').style.display = 'block';
      if (type==='tv' && det.number_of_seasons) {
        document.getElementById('heroExtra').textContent = det.number_of_seasons + ' Season' + (det.number_of_seasons>1?'s':'');
        document.getElementById('heroDot2').style.display = 'block';
      }
      if (type==='movie' && det.runtime) {
        document.getElementById('heroExtra').textContent = det.runtime + ' min';
        document.getElementById('heroDot2').style.display = 'block';
      }
    }
  } catch(e){}
}
function buildMosaic() {
  const el = document.getElementById('heroMosaic');
  el.innerHTML = heroItems.slice(0,4).map(item => {
    const t = item.title || item.name || '';
    const type = item.title ? 'movie' : 'tv';
    const y = (item.release_date||item.first_air_date||'').slice(0,4);
    return `<div class="mosaic-item" onclick="openPlayer('${type}',${item.id})">
      ${item.poster_path ? `<img src="${IMG}${item.poster_path}" alt="${esc(t)}">` : ''}
      <div class="mosaic-hover">
        <div class="mosaic-hover-title">${esc(t)}</div>
        <div class="mosaic-hover-meta">${y} · ${type==='tv'?'Series':'Movie'}</div>
      </div>
    </div>`;
  }).join('');
}
function startTimer() {
  if (heroTimer) clearInterval(heroTimer);
  heroTimer = setInterval(() => renderHero((heroIdx+1)%heroItems.length), 8000);
}
function jumpHero(i) { renderHero(i); if(heroTimer){clearInterval(heroTimer);startTimer();} }

// ── ROWS ──
const ROW_CONFIG = [
  { id:'trendingMovies', ep:'/trending/movie/week', type:'movie' },
  { id:'trendingTV',     ep:'/trending/tv/week',    type:'tv' },
  { id:'topMovies',      ep:'/movie/top_rated',     type:'movie' },
  { id:'popTV',          ep:'/tv/popular',          type:'tv' },
  { id:'nowPlaying',     ep:'/movie/now_playing',   type:'movie' },
  { id:'upcoming',       ep:'/movie/upcoming',      type:'movie' },
];
async function loadAllRows() {
  ROW_CONFIG.forEach(r => loadRow(r.ep, r.id, r.type));
}
async function loadRow(endpoint, id, type, page=1) {
  const el = document.getElementById(id);
  if (!el) return;
  // Show skeletons
  if (page===1) el.innerHTML = Array(8).fill(`<div class="dcard-skeleton"><div class="skel skel-poster"></div><div class="skel skel-line"></div><div class="skel skel-line short"></div></div>`).join('');
  const sep = endpoint.includes('?') ? '&' : '?';
  const data = await api(`${endpoint}${sep}page=${page}`);
  if (!data?.results) { el.innerHTML = '<div class="err">Failed to load</div>'; return; }
  if (page===1) el.innerHTML = '';
  const frag = document.createDocumentFragment();
  data.results.forEach(item => frag.appendChild(makeCard(item, type)));
  el.appendChild(frag);
}
async function expandRow(id, type) {
  const config = ROW_CONFIG.find(r=>r.id===id);
  if (!config) return;
  const el = document.getElementById(id);
  const pages = [2,3,4];
  for (const p of pages) await loadRow(config.ep, id, type, p);
}
function makeCard(item, type) {
  const title = item.title || item.name || '?';
  const year = (item.release_date || item.first_air_date || '').slice(0,4);
  const rating = item.vote_average ? item.vote_average.toFixed(1) : '';
  const poster = item.poster_path ? `${IMG}${item.poster_path}` : null;
  const div = document.createElement('div');
  div.className = 'dcard';
  div.innerHTML = `
    <div class="dcard-poster">
      ${poster ? `<img src="${poster}" alt="" loading="lazy">` : '<div class="dcard-poster-ph">?</div>'}
      <div class="dcard-hover-overlay">
        <div class="dcard-play"><svg width="10" height="12" viewBox="0 0 10 12" fill="black"><path d="M1 1l8 5-8 5V1z"/></svg></div>
        <div class="dcard-hover-title">${esc(title)}</div>
        <div class="dcard-hover-meta">${year}${rating?' · ★'+rating:''}</div>
      </div>
      <div class="dcard-type">${type==='tv'?'TV':'Film'}</div>
    </div>
    <div class="dcard-info">
      <div class="dcard-title">${esc(title)}</div>
      <div class="dcard-meta">${rating?`<span class="star">★</span> ${rating} · `:''}${year}</div>
    </div>`;
  div.addEventListener('click', () => openPlayer(type, item.id));
  return div;
}

// ── TABS ──
function setCtab(tab, btn) {
  document.querySelectorAll('.ctab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const show = {
    rowTrendingMovies: tab==='all'||tab==='movie',
    rowTrendingTV:     tab==='all'||tab==='tv',
    rowTopMovies:      tab==='all'||tab==='movie'||tab==='top',
    rowPopTV:          tab==='all'||tab==='tv',
    rowNowPlaying:     tab==='all'||tab==='movie'||tab==='theaters',
    rowUpcoming:       tab==='all'||tab==='movie'||tab==='theaters',
  };
  Object.entries(show).forEach(([id,v]) => {
    const el = document.getElementById(id);
    if (el) el.style.display = v ? 'block' : 'none';
  });
}
function setNavActive(btn) {
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
}
function navHome(btn) { setNavActive(btn); showAllRows(); }
function navMovies(btn) { setNavActive(btn); setCtab('movie', document.querySelectorAll('.ctab')[1]); }
function navSeries(btn) { setNavActive(btn); setCtab('tv', document.querySelectorAll('.ctab')[2]); }
function navTrending(btn) {
  setNavActive(btn);
  document.querySelectorAll('.ctab').forEach(b=>b.classList.remove('active'));
  Object.keys({rowTrendingMovies:1,rowTrendingTV:1,rowTopMovies:0,rowPopTV:0,rowNowPlaying:0,rowUpcoming:0}).forEach((id,i,arr) => {
    const el = document.getElementById(id);
    if(el) el.style.display = (id==='rowTrendingMovies'||id==='rowTrendingTV') ? 'block':'none';
  });
}
function navTopRated(btn) {
  setNavActive(btn);
  document.querySelectorAll('.ctab').forEach(b=>b.classList.remove('active'));
  ['rowTrendingMovies','rowTrendingTV','rowTopMovies','rowPopTV','rowNowPlaying','rowUpcoming'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.style.display = id==='rowTopMovies' ? 'block':'none';
  });
}
function showAllRows() {
  ['rowTrendingMovies','rowTrendingTV','rowTopMovies','rowPopTV','rowNowPlaying','rowUpcoming'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.style.display = 'block';
  });
  document.querySelectorAll('.ctab').forEach((b,i)=>b.classList.toggle('active',i===0));
}

// ── SEARCH ──
function openSearch() {
  document.getElementById('searchOverlay').classList.add('open');
  document.getElementById('searchInput').focus();
}
function closeSearch() {
  document.getElementById('searchOverlay').classList.remove('open');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchGrid').innerHTML = '';
}
document.getElementById('searchInput').addEventListener('keydown', e => {
  if(e.key==='Escape'){closeSearch();return}
  clearTimeout(searchTO);
  searchTO = setTimeout(()=>doSearch(e.target.value), e.key==='Enter'?0:500);
});
async function doSearch(q) {
  q = q.trim();
  if(q.length < 2) { document.getElementById('searchGrid').innerHTML=''; return; }
  document.getElementById('searchGrid').innerHTML = Array(6).fill(`<div class="dcard-skeleton"><div class="skel skel-poster"></div><div class="skel skel-line"></div><div class="skel skel-line short"></div></div>`).join('');
  const data = await api(`/search/multi?query=${encodeURIComponent(q)}&include_adult=false`);
  const grid = document.getElementById('searchGrid');
  if(!data?.results){grid.innerHTML='<div class="err">Search failed.</div>';return}
  const filtered = data.results.filter(r=>r.media_type==='movie'||r.media_type==='tv');
  if(!filtered.length){grid.innerHTML='<p style="color:var(--muted);padding:1rem">No results found.</p>';return}
  grid.innerHTML='';
  const frag = document.createDocumentFragment();
  filtered.forEach(item=>frag.appendChild(makeCard(item,item.media_type)));
  grid.appendChild(frag);
}

// ── PLAYER ──
function getUrl(server, type, id, s, e) {
  const urls = {
    vidapi:    type==='movie' ? `https://player.cineby.workers.dev/movie/${id}?primaryColor=0063e5&autoplay=true&nextbutton=true` : `https://player.cineby.workers.dev/tv/${id}/${s}/${e}?primaryColor=0063e5&autoplay=true&nextbutton=true`,
    vidking:   type==='movie' ? `https://www.vidking.net/embed/movie/${id}?autoPlay=true` : `https://www.vidking.net/embed/tv/${id}/${s}/${e}?autoPlay=true`,
    multiembed:type==='movie' ? `https://multiembed.mov/?video_id=${id}&tmdb=1` : `https://multiembed.mov/?video_id=${id}&s=${s}&e=${e}&tmdb=1`,
    vidsrc:    type==='movie' ? `https://vidsrc.icu/embed/movie/${id}` : `https://vidsrc.icu/embed/tv/${id}/${s}/${e}`,
    vidsrcto:  type==='movie' ? `https://vidsrc.to/embed/movie/${id}` : `https://vidsrc.to/embed/tv/${id}/${s}/${e}`,
    autoembed: type==='movie' ? `https://autoembed.co/movie/tmdb/${id}` : `https://autoembed.co/tv/tmdb/${id}-${s}-${e}`,
    '2embed':  type==='movie' ? `https://2embed.cc/embed/${id}` : `https://2embed.cc/embedtv/${id}&s=${s}&e=${e}`,
  };
  return urls[server]||'';
}
function changeServer(srv, e) {
  curServer = srv;
  document.querySelectorAll('.psrv').forEach(b=>b.classList.remove('active'));
  if(e?.target) e.target.classList.add('active');
  loadStream();
}
function loadStream() {
  const fr = document.getElementById('stream-frame');
  const ld = document.getElementById('pmLoading');
  ld.style.display='flex'; fr.style.opacity='0'; fr.src='';
  const url = getUrl(curServer, curType, curId, curSeason, curEp);
  if(url) {
    setTimeout(()=>{
      fr.src=url;
      fr.onload=()=>{ld.style.display='none';fr.style.opacity='1'};
    },100);
  }
}
async function openPlayer(type, id) {
  curType=type; curId=id; curSeason=1; curEp=1; curServer='vidapi';
  const modal = document.getElementById('playerModal');
  modal.classList.add('open');
  document.body.style.overflow='hidden';
  document.querySelectorAll('.psrv').forEach(b=>b.classList.remove('active'));
  document.querySelector('.psrv.best').classList.add('active');
  const data = await api(`/${type}/${id}?append_to_response=videos`);
  if(data) {
    curData=data;
    document.getElementById('modalTitle').textContent = data.title||data.name||'';
    document.getElementById('overviewText').textContent = data.overview||'No overview available.';
    const epSel = document.getElementById('episodeSelector');
    if(type==='tv') {
      epSel.style.display='block';
      const sel = document.getElementById('seasonSelect');
      sel.innerHTML=(data.seasons||[]).filter(s=>s.season_number>0).map((s,i)=>`<option value="${s.season_number}">Season ${s.season_number}</option>`).join('');
      changeSeason();
    } else {
      epSel.style.display='none';
      loadStream();
    }
  }
}
function changeSeason() {
  curSeason = parseInt(document.getElementById('seasonSelect').value)||1;
  api(`/tv/${curId}/season/${curSeason}`).then(data=>{
    if(data?.episodes) {
      document.getElementById('episodeGrid').innerHTML = data.episodes.map((ep,i)=>
        `<button class="pm-ep-btn ${i===0?'active':''}" onclick="changeEp(${ep.episode_number},this)">${ep.episode_number}</button>`
      ).join('');
      curEp=data.episodes[0].episode_number;
      loadStream();
    }
  });
}
function changeEp(num, btn) {
  curEp=num;
  document.querySelectorAll('.pm-ep-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadStream();
}
function closeModal() {
  document.getElementById('playerModal').classList.remove('open');
  document.getElementById('stream-frame').src='';
  document.body.style.overflow='';
}
function playTrailer() {
  if(curData?.videos?.results?.length) {
    const t=curData.videos.results.find(v=>v.type==='Trailer'&&v.site==='YouTube')||curData.videos.results[0];
    if(t) window.open(`https://youtube.com/watch?v=${t.key}`,'_blank');
  } else alert('No trailer available');
}
window.addEventListener('click', e=>{ if(e.target===document.getElementById('playerModal')) closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closeModal(); closeSearch(); }});

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => { initHero(); loadAllRows(); });
</script>
</body>
</html>
